name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: darwin-arm64
          - os: macos-13
            name: darwin-x86_64
          - os: ubuntu-22.04
            name: linux-x86_64
          - os: ubuntu-22.04-arm
            name: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.name }}
          repository-cache: true

      - uses: extractions/setup-just@v2

      - name: Build release tarball
        run: just release

      - uses: actions/upload-artifact@v4
        with:
          name: ally-${{ matrix.name }}
          path: dist/ally-*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: cd dist && sha256sum ally-*.tar.gz > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ally-*.tar.gz
            dist/SHA256SUMS.txt
          draft: true
          generate_release_notes: true

  update-homebrew:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: Tomskoo/homebrew-ally
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          gh release download "v$VERSION" \
            --repo Tomskoo/ally \
            --pattern 'SHA256SUMS.txt' \
            --dir /tmp

      - name: Rewrite formula
        run: |
          SHA_DARWIN_ARM=$(awk '/ally-darwin-arm64/   {print $1}' /tmp/SHA256SUMS.txt)
          SHA_DARWIN_X86=$(awk '/ally-darwin-x86_64/  {print $1}' /tmp/SHA256SUMS.txt)
          SHA_LINUX_ARM=$(awk  '/ally-linux-arm64/    {print $1}' /tmp/SHA256SUMS.txt)
          SHA_LINUX_X86=$(awk  '/ally-linux-x86_64/   {print $1}' /tmp/SHA256SUMS.txt)
          python3 tools/update_formula.py \
            --version "$VERSION" \
            --darwin-arm "$SHA_DARWIN_ARM" \
            --darwin-x86 "$SHA_DARWIN_X86" \
            --linux-arm  "$SHA_LINUX_ARM" \
            --linux-x86  "$SHA_LINUX_X86"

      - name: Commit and push
        run: |
          git config user.name  "ally-release-bot"
          git config user.email "ally-release-bot@users.noreply.github.com"
          git add Formula/ally.rb
          if git diff --cached --quiet; then
            echo "Formula already up-to-date for $VERSION"
            exit 0
          fi
          git commit -m "ally $VERSION"
          git push
